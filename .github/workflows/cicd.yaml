name: CI/CD PIPELINE TO BUILD AND DEPLOY TO TOMCAT

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate Project
        run: mvn validate

      - name: Compile Project
        run: mvn compile

      - name: Run Unit Tests
        run: mvn test

      - name: Package Application
        run: mvn clean package

      - name: Verify WAR File
        run: ls -lh target/
      # Configure Maven Settings
      - name: Configure Maven Settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
           <servers>
            <server>
             <id>nexus</id>
             <username>${{ secrets.NEXUS_USERNAME }}</username>
             <password>${{ secrets.NEXUS_PASSWORD }}</password>
            </server>
           </servers>
          </settings>
          EOF
      # Deploy to Nexus
      - name: Deploy Artifact to Nexus
        run: |
          mvn deploy \
            -DskipTests \
            -DaltDeploymentRepository=nexus::default::${{ secrets.NEXUS_REPO_URL }}

     
     
